name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  backend:
    name: Backend (typecheck, test, eval smoke)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: copilot
          POSTGRES_PASSWORD: copilot
          POSTGRES_DB: copilot_test
        ports: ['5432:5432']
        options: >-
          --health-cmd="pg_isready -U copilot -d copilot_test"
          --health-interval=10s --health-timeout=5s --health-retries=6
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s --health-timeout=3s --health-retries=6
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: postgresql://copilot:copilot@localhost:5432/copilot_test
      REDIS_URL: redis://localhost:6379/0
      AUTH_SECRET: test-secret-ci-only
      OLLAMA_BASE_URL: http://localhost:11434
      OLLAMA_MODEL: qwen2.5:7b-instruct
      OLLAMA_EMBEDDING_MODEL: nomic-embed-text
      METRICS_KEY: ci-key
      LLM_LOG_SAMPLING_RATE: '0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate deploy
      - run: npx tsc --noEmit
      - run: npm test -- --reporter=default
      # eval smoke exercises the golden dataset against a stubbed Ollama —
      # skipped if no Ollama available; runner gracefully reports.
      - run: npm run eval:smoke || true

  frontend:
    name: Frontend (lint, typecheck, build, axe)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      # Serve the built bundle and run axe-core against key pages.
      - name: axe-core accessibility scan
        run: |
          npx --yes serve -s dist -l 4173 &
          SERVER_PID=$!
          sleep 4
          npx --yes @axe-core/cli http://localhost:4173/ --exit || true
          npx --yes @axe-core/cli http://localhost:4173/login --exit || true
          kill $SERVER_PID || true

  docker:
    name: Docker build (main only)
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-backend:latest
            ghcr.io/${{ github.repository }}-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-frontend:latest
            ghcr.io/${{ github.repository }}-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
      - name: Build ai-sidecar image
        uses: docker/build-push-action@v6
        with:
          context: ./ai-sidecar
          push: true
          tags: |
            ghcr.io/${{ github.repository }}-ai-sidecar:latest
            ghcr.io/${{ github.repository }}-ai-sidecar:${{ github.sha }}
          cache-from: type=gha,scope=ai-sidecar
          cache-to: type=gha,mode=max,scope=ai-sidecar
